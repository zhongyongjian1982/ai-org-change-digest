name: daily-digest

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Build digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/build.py
      - name: Sync to Tencent COS
        env:
          TENCENT_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
          TENCENT_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
        run: |
          pip install coscmd
          coscmd config -a "$TENCENT_SECRET_ID" -s "$TENCENT_SECRET_KEY" -b ted-pages-1409060250 -r ap-guangzhou
          coscmd upload -r -f docs/ aitransformation/
      - name: Purge EdgeOne CDN cache
        env:
          TENCENT_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
          TENCENT_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
        run: |
          pip install tccli
          tccli teo CreatePurgeTask \
            --secretId "$TENCENT_SECRET_ID" \
            --secretKey "$TENCENT_SECRET_KEY" \
            --region ap-guangzhou \
            --ZoneId zone-3ourx6uea6bu \
            --Type purge_prefix \
            --Method invalidate \
            --Targets '["https://www.tedzhong.com/aitransformation/"]'
      - name: Commit updates
        run: |
          git config user.name "digest-bot"
          git config user.email "digest-bot@users.noreply.github.com"
          git add data docs
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "digest: $(date -u +%Y-%m-%d)"
            git push
          fi
